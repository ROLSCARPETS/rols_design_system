<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #fff; }
  .card { padding: 0; }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0; }
  .img { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; }
  .swatch { aspect-ratio: 1/1; display: flex; align-items: flex-end; padding: 12px; }
  .label { font-family: "Montserrat", sans-serif; font-size: 10px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; }
</style></head>
<body><div class="card"><div class="grid">
  <img class="img" src="../assets/product-poolside.png">
  <div class="swatch" style="background:#D7CDC5"><span class="label" style="color:#4D4D4D">sand</span></div>
  <img class="img" src="../assets/product-textures.png">
  <div class="swatch" style="background:#D5B38C"><span class="label" style="color:#4D4D4D">tan</span></div>
  <img class="img" src="../assets/product-lemons.png">
  <div class="swatch" style="background:#4D4D4D"><span class="label" style="color:#fff">graphite</span></div>
</div></div></body></html>
