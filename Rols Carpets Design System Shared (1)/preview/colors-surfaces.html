<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 0; }
  .swatch { padding: 24px; height: 180px; display: flex; flex-direction: column; justify-content: space-between; }
  .name { font-family: "Montserrat", sans-serif; font-size: 13px; font-weight: 600; color: #2A2A2A; }
  .hex  { font-family: "Montserrat", sans-serif; font-size: 11px; color: #7A7A7A; letter-spacing: 0.04em; }
  .role { font-family: "Montserrat", sans-serif; font-size: 11px; color: #7A7A7A; line-height: 1.5; }
</style></head>
<body><div class="grid">
  <div class="swatch" style="background: #FAF8F6;">
    <div><div class="name">Sand 50</div><div class="hex">#FAF8F6</div></div>
    <div class="role">Fondo cálido suave</div>
  </div>
  <div class="swatch" style="background: #D7CDC5;">
    <div><div class="name">Sand</div><div class="hex">#D7CDC5</div></div>
    <div class="role">Fondo highlight cálido</div>
  </div>
  <div class="swatch" style="background: #F5F5F5;">
    <div><div class="name">Mist 50</div><div class="hex">#F5F5F5</div></div>
    <div class="role">Sección secundaria · separador</div>
  </div>
  <div class="swatch" style="background: #ECECEC;">
    <div><div class="name">Mist 100</div><div class="hex">#ECECEC</div></div>
    <div class="role">Separador más marcado</div>
  </div>
</div></body></html>
