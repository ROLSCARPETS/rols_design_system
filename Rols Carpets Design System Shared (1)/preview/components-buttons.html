<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #fff; }
  .card { padding: 32px; display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
  button {
    font-family: "Montserrat", sans-serif; font-weight: 500; cursor: pointer;
    transition: background 280ms cubic-bezier(0.22, 1, 0.36, 1), color 280ms cubic-bezier(0.22, 1, 0.36, 1);
  }
  /* Primary — tan pill, hover → cool mist */
  .b-primary {
    background: #D5B38C; color: #2A2A2A; border: none;
    border-radius: 999px; padding: 14px 28px; font-size: 14px; font-weight: 600;
  }
  .b-primary:hover { background: #ECECEC; color: #2A2A2A; }
  /* Secondary — outline pill */
  .b-secondary {
    background: transparent; color: #2A2A2A; border: 1px solid #4D4D4D;
    border-radius: 999px; padding: 13px 27px; font-size: 14px; font-weight: 600;
  }
  .b-secondary:hover { background: #4D4D4D; color: #fff; }
  /* Dark — graphite pill */
  .b-dark {
    background: #4D4D4D; color: #fff; border: none;
    border-radius: 999px; padding: 14px 28px; font-size: 14px; font-weight: 600;
  }
  .b-dark:hover { background: #2A2A2A; }
  /* Inline lowercase — per manual */
  .b-inline {
    background: transparent; border: none; color: #4D4D4D;
    font-size: 13px; letter-spacing: 0.08em; text-transform: lowercase;
    padding: 0; padding-bottom: 4px; border-bottom: 1px solid #4D4D4D;
  }
  .note { font-family: "Montserrat", sans-serif; font-size: 11px; color: #7A7A7A; margin-top: 8px; flex-basis: 100%; letter-spacing: 0.04em; }
</style></head>
<body><div class="card">
  <button class="b-primary">Descubre cómo trabajamos</button>
  <button class="b-secondary">Ver colección</button>
  <button class="b-dark">Comprar ahora</button>
  <button class="b-inline">ver colección →</button>
  <div class="note">Hover del CTA primario: tan → mist 100 (#ECECEC), siguiendo el comportamiento de la web actual.</div>
</div></body></html>
