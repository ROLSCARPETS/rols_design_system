<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #fff; }
  .card { padding: 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .product { background: #fff; overflow: hidden; cursor: pointer; }
  .img-wrap { width: 100%; aspect-ratio: 4/3; overflow: hidden; border-radius: 14px; }
  .img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: transform 600ms cubic-bezier(0.22, 1, 0.36, 1); }
  .product:hover .img-wrap img { transform: scale(1.03); }
  .info { padding: 14px 4px 4px; }
  .name { font-family: "League Spartan", sans-serif; font-weight: 500; font-size: 18px; color: #4D4D4D; margin: 0 0 4px; letter-spacing: -0.01em; }
  .meta { font-family: "Montserrat", sans-serif; font-size: 12px; color: #7A7A7A; }
  .price { font-family: "Montserrat", sans-serif; font-size: 13px; font-weight: 600; color: #4D4D4D; margin-top: 8px; }
</style></head>
<body><div class="card">
  <div class="product">
    <div class="img-wrap"><img src="../assets/product-textures.png" alt=""></div>
    <div class="info">
      <div class="name">Calma</div>
      <div class="meta">Yute · 200 × 300 cm</div>
      <div class="price">€ 480</div>
    </div>
  </div>
  <div class="product">
    <div class="img-wrap"><img src="../assets/product-poolside.png" alt=""></div>
    <div class="info">
      <div class="name">Marea</div>
      <div class="meta">PET reciclado · exterior</div>
      <div class="price">€ 340</div>
    </div>
  </div>
</div></body></html>
