<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #fff; }
  .card { padding: 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .demo { display: flex; flex-direction: column; gap: 10px; }
  .label { font-family: "Montserrat", sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #7A7A7A; }
  .row { display: flex; align-items: center; gap: 8px; }
  .swatch { width: 28px; height: 28px; border-radius: 0; }
  .v { font-family: "Montserrat", sans-serif; font-size: 12px; color: #4D4D4D; }
</style></head>
<body><div class="card">
  <div class="demo">
    <div class="label">Radii</div>
    <div class="row"><div class="swatch" style="background:#E5DCD2;border-radius:0"></div><span class="v">none · 0px</span></div>
    <div class="row"><div class="swatch" style="background:#E5DCD2;border-radius:2px"></div><span class="v">sm · 2px</span></div>
    <div class="row"><div class="swatch" style="background:#E5DCD2;border-radius:4px"></div><span class="v">md · 4px (default)</span></div>
    <div class="row"><div class="swatch" style="background:#E5DCD2;border-radius:8px"></div><span class="v">lg · 8px</span></div>
    <div class="row"><div class="swatch" style="background:#E5DCD2;border-radius:999px;width:48px"></div><span class="v">pill · chips only</span></div>
  </div>
  <div class="demo">
    <div class="label">Shadows</div>
    <div class="row"><div class="swatch" style="background:#fff;box-shadow:0 1px 2px rgba(77,77,77,0.06);border-radius:4px"></div><span class="v">xs</span></div>
    <div class="row"><div class="swatch" style="background:#fff;box-shadow:0 2px 8px rgba(77,77,77,0.06);border-radius:4px"></div><span class="v">sm</span></div>
    <div class="row"><div class="swatch" style="background:#fff;box-shadow:0 8px 24px rgba(77,77,77,0.08);border-radius:4px"></div><span class="v">md</span></div>
    <div class="row"><div class="swatch" style="background:#fff;box-shadow:0 20px 48px rgba(77,77,77,0.12);border-radius:4px"></div><span class="v">lg</span></div>
  </div>
</div></body></html>
