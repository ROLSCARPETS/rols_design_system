<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #fff; font-family: var(--font-body); color: var(--color-fg); }
  .card { padding: 28px; }
  .specimen { font-family: "League Spartan", sans-serif; font-weight: 400; font-size: 88px; line-height: 0.95; letter-spacing: -0.02em; color: #4D4D4D; margin: 0 0 12px; }
  .meta { display: flex; gap: 24px; font-family: "Montserrat", sans-serif; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: #7A7A7A; }
  .meta span strong { color: #4D4D4D; font-weight: 600; }
</style></head>
<body><div class="card">
  <div class="specimen">League Spartan</div>
  <div class="meta">
    <span><strong>Display</strong></span>
    <span>Headlines · titles</span>
    <span>300 / 400 / 500 / 700</span>
  </div>
</div></body></html>
