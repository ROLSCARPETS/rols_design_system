<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  .card { display: grid; grid-template-columns: 1fr 1fr 1fr; height: 240px; }
  .panel { display: flex; align-items: center; justify-content: center; padding: 24px; }
  .light { background: #fff; }
  .sand { background: #D7CDC5; }
  .dark { background: #4D4D4D; }
  .panel img { height: 96px; }
</style></head>
<body><div class="card">
  <div class="panel light"><img src="../assets/logo-rols-black.png" alt="rols"></div>
  <div class="panel sand"><img src="../assets/logo-rols-black.png" alt="rols"></div>
  <div class="panel dark"><img src="../assets/logo-rols-black.png" alt="rols" style="filter: invert(1) brightness(2);"></div>
</div></body></html>
