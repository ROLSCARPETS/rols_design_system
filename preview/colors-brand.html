<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #fff; font-family: var(--font-body); color: var(--color-fg); }
  .card { padding: 24px; }
  .swatches { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .sw { display: flex; flex-direction: column; gap: 6px; }
  .chip { aspect-ratio: 1.6 / 1; border-radius: 4px; border: 1px solid rgba(77,77,77,0.08); }
  .name { font-family: var(--font-body); font-size: 11px; font-weight: 600; letter-spacing: 0.04em; color: var(--rols-graphite); }
  .hex { font-family: var(--font-body); font-size: 11px; color: var(--rols-ink-500); letter-spacing: 0.02em; }
</style></head>
<body><div class="card">
  <div class="swatches">
    <div class="sw"><div class="chip" style="background:#D7CDC5"></div><div class="name">Sand</div><div class="hex">#D7CDC5</div></div>
    <div class="sw"><div class="chip" style="background:#FFFFFF;border-color:#E5DCD2"></div><div class="name">White</div><div class="hex">#FFFFFF</div></div>
    <div class="sw"><div class="chip" style="background:#D5B38C"></div><div class="name">Tan</div><div class="hex">#D5B38C</div></div>
    <div class="sw"><div class="chip" style="background:#4D4D4D"></div><div class="name">Graphite</div><div class="hex">#4D4D4D</div></div>
  </div>
</div></body></html>
