<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #fff; font-family: var(--font-body); color: var(--color-fg); }
  .card { padding: 24px; }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 0; margin-bottom: 16px; }
  .row:last-child { margin-bottom: 0; }
  .chip { aspect-ratio: 1.4 / 1; display: flex; align-items: flex-end; padding: 6px 8px; }
  .label { font-family: var(--font-body); font-size: 10px; font-weight: 500; letter-spacing: 0.03em; }
  .ramp-name { font-family: var(--font-body); font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--rols-ink-500); margin-bottom: 6px; }
</style></head>
<body><div class="card">
  <div class="ramp-name">Sand</div>
  <div class="row">
    <div class="chip" style="background:#FAF8F6"><span class="label" style="color:#4D4D4D">50</span></div>
    <div class="chip" style="background:#F2EDE8"><span class="label" style="color:#4D4D4D">100</span></div>
    <div class="chip" style="background:#E5DCD2"><span class="label" style="color:#4D4D4D">200</span></div>
    <div class="chip" style="background:#D7CDC5"><span class="label" style="color:#4D4D4D">300</span></div>
    <div class="chip" style="background:#BFB3A8"><span class="label" style="color:#fff">400</span></div>
    <div class="chip" style="background:#8C8278"><span class="label" style="color:#fff">500</span></div>
  </div>
  <div class="ramp-name">Tan</div>
  <div class="row">
    <div class="chip" style="background:#EFE2CD"><span class="label" style="color:#4D4D4D">100</span></div>
    <div class="chip" style="background:#E2C9A9"><span class="label" style="color:#4D4D4D">200</span></div>
    <div class="chip" style="background:#D5B38C"><span class="label" style="color:#4D4D4D">300</span></div>
    <div class="chip" style="background:#B89368"><span class="label" style="color:#fff">400</span></div>
    <div class="chip" style="background:#fff;border:1px solid #E5DCD2"><span class="label" style="color:#B5B5B5">—</span></div>
    <div class="chip" style="background:#fff;border:1px solid #E5DCD2"><span class="label" style="color:#B5B5B5">—</span></div>
  </div>
  <div class="ramp-name">Ink</div>
  <div class="row">
    <div class="chip" style="background:#E8E8E8"><span class="label" style="color:#4D4D4D">100</span></div>
    <div class="chip" style="background:#B5B5B5"><span class="label" style="color:#fff">300</span></div>
    <div class="chip" style="background:#7A7A7A"><span class="label" style="color:#fff">500</span></div>
    <div class="chip" style="background:#4D4D4D"><span class="label" style="color:#fff">700</span></div>
    <div class="chip" style="background:#2A2A2A"><span class="label" style="color:#fff">900</span></div>
    <div class="chip" style="background:#fff;border:1px solid #E5DCD2"><span class="label" style="color:#B5B5B5">—</span></div>
  </div>
</div></body></html>
