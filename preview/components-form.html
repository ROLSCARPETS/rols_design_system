<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #fff; }
  .wrap { padding: 32px; max-width: 380px; }
  .field { margin-bottom: 18px; }
  .label { font-family: "Montserrat", sans-serif; font-size: 13px; font-weight: 500; color: #2A2A2A; margin-bottom: 8px; display: block; }
  .label .unit { color: #7A7A7A; font-weight: 400; }
  .input, .select {
    font-family: "Montserrat", sans-serif; font-size: 14px; color: #2A2A2A;
    width: 100%; height: 44px; padding: 0 14px; box-sizing: border-box;
    background: #fff; border: 1px solid #DDDDDD; border-radius: 8px;
    outline: none; transition: border-color 200ms cubic-bezier(0.22,1,0.36,1);
  }
  .input:focus, .select:focus { border-color: #4D4D4D; }
  .select {
    appearance: none; -webkit-appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='none' stroke='%234D4D4D' stroke-width='1.5' d='M1 1.5l5 5 5-5'/></svg>");
    background-repeat: no-repeat; background-position: right 14px center; padding-right: 36px;
  }
  .helper { font-family: "Montserrat", sans-serif; font-size: 12px; color: #7A7A7A; margin-top: 6px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
</style></head>
<body><div class="wrap">
  <div class="field">
    <label class="label">Tamaño</label>
    <select class="select"><option>100</option><option>120</option></select>
  </div>
  <div class="row">
    <div class="field">
      <label class="label">Ancho <span class="unit">(cm)</span></label>
      <input class="input" value="100">
      <div class="helper">Min: 50 — Max: 300</div>
    </div>
    <div class="field">
      <label class="label">Largo <span class="unit">(cm)</span></label>
      <input class="input" value="100">
      <div class="helper">Min: 50 — Max: 300</div>
    </div>
  </div>
</div></body></html>
