<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #fff; }
  .card { padding: 24px; }
  .row { display: flex; align-items: flex-end; gap: 16px; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { background: #D7CDC5; width: 22px; }
  .label { font-family: "Montserrat", sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 0.06em; color: #4D4D4D; }
  .v { font-family: "Montserrat", sans-serif; font-size: 9px; color: #7A7A7A; }
</style></head>
<body><div class="card">
  <div class="row">
    <div class="col"><div class="bar" style="height:4px"></div><span class="label">1</span><span class="v">4</span></div>
    <div class="col"><div class="bar" style="height:8px"></div><span class="label">2</span><span class="v">8</span></div>
    <div class="col"><div class="bar" style="height:12px"></div><span class="label">3</span><span class="v">12</span></div>
    <div class="col"><div class="bar" style="height:16px"></div><span class="label">4</span><span class="v">16</span></div>
    <div class="col"><div class="bar" style="height:24px"></div><span class="label">5</span><span class="v">24</span></div>
    <div class="col"><div class="bar" style="height:32px"></div><span class="label">6</span><span class="v">32</span></div>
    <div class="col"><div class="bar" style="height:48px"></div><span class="label">7</span><span class="v">48</span></div>
    <div class="col"><div class="bar" style="height:64px"></div><span class="label">8</span><span class="v">64</span></div>
    <div class="col"><div class="bar" style="height:96px"></div><span class="label">9</span><span class="v">96</span></div>
    <div class="col"><div class="bar" style="height:128px"></div><span class="label">10</span><span class="v">128</span></div>
  </div>
</div></body></html>
