<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #fff; }
  .card { padding: 28px; display: flex; flex-direction: column; gap: 18px; }
  .row { display: grid; grid-template-columns: 90px 1fr; gap: 20px; align-items: baseline; border-bottom: 1px solid #F2EDE8; padding-bottom: 14px; }
  .row:last-child { border-bottom: 0; padding-bottom: 0; }
  .tag { font-family: "Montserrat", sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #7A7A7A; }
  .h1 { font-family: "League Spartan", sans-serif; font-weight: 500; font-size: 36px; line-height: 1.15; letter-spacing: -0.01em; color: #4D4D4D; }
  .h2 { font-family: "League Spartan", sans-serif; font-weight: 500; font-size: 26px; line-height: 1.15; letter-spacing: -0.01em; color: #4D4D4D; }
  .h3 { font-family: "Montserrat", sans-serif; font-weight: 600; font-size: 17px; color: #4D4D4D; }
  .body { font-family: "Montserrat", sans-serif; font-size: 15px; line-height: 1.6; color: #4D4D4D; }
  .small { font-family: "Montserrat", sans-serif; font-size: 13px; color: #7A7A7A; }
</style></head>
<body><div class="card">
  <div class="row"><span class="tag">H1 · 36</span><div class="h1">Tejida a mano, diseñada para durar.</div></div>
  <div class="row"><span class="tag">H2 · 26</span><div class="h2">Una colección para suelos vividos</div></div>
  <div class="row"><span class="tag">H3 · 17</span><div class="h3">Calma · 200×300 cm</div></div>
  <div class="row"><span class="tag">Body · 15</span><div class="body">Cada alfombra Rols se teje en talleres familiares, con fibras naturales seleccionadas a mano.</div></div>
  <div class="row"><span class="tag">Small · 13</span><div class="small">Envío en 7–10 días laborables a península.</div></div>
</div></body></html>
