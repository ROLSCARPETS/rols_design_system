<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #fff; }
  .card { padding: 28px; display: flex; flex-direction: column; gap: 14px; }
  .group { display: flex; align-items: center; gap: 18px; }
  .label { font-family: "Montserrat", sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #7A7A7A; min-width: 90px; }
  .eyebrow { font-family: "Montserrat", sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: #4D4D4D; }
  .cta { font-family: "Montserrat", sans-serif; font-size: 13px; font-weight: 500; letter-spacing: 0.08em; text-transform: lowercase; color: #4D4D4D; display: inline-flex; align-items: center; gap: 8px; }
  .cta::after { content: '→'; }
  .micro { font-family: "Montserrat", sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 0.04em; color: #7A7A7A; }
  .quote { font-family: "League Spartan", sans-serif; font-weight: 300; font-style: italic; font-size: 22px; line-height: 1.3; color: #4D4D4D; }
</style></head>
<body><div class="card">
  <div class="group"><span class="label">Eyebrow</span><span class="eyebrow">Nueva colección · primavera 26</span></div>
  <div class="group"><span class="label">CTA</span><span class="cta">ver colección</span></div>
  <div class="group"><span class="label">Micro</span><span class="micro">REF · CALMA-2030 · IN STOCK</span></div>
  <div class="group"><span class="label">Quote</span><span class="quote">"Una alfombra que crece con la casa."</span></div>
</div></body></html>
